#version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  # hailo:
  #   build: hailo
  #   environment:
  #     - UDEV=1
  #   devices:
  #     - /dev/dri:/dev/dri
  #     - /dev/hailo0:/dev/hailo0
  #   volumes:
  #     - /dev:/dev
  #     - /lib/firmware:/lib/firmware
  #     - /run/udev:/run/udev:ro
  #     - /sys:/sys
  #   privileged: true
  #   network_mode: host
  #   ipc: host
  #   tty: true
  #   stdin_open: true
  #   group_add:
  #     - 44
  #   security_opt:
  #     - apparmor:unconfined

  openwakeword:
    image: rhasspy/wyoming-openwakeword:latest
    container_name: openwakeword
    restart: unless-stopped
    ports:
      - "10400:10400"
    volumes:
      - ./openwakeword/custom:/custom:ro
    command: >
      --uri tcp://0.0.0.0:10400
      --custom-model-dir /custom
      --preload-model computer
      --debug
      
  rviz:
    build:
      context: ./docker/rviz
    image: robotics-rviz:jazzy
    container_name: robotics-rviz
    network_mode: host
    environment:
      - DISPLAY=${DISPLAY:-host.docker.internal:0}
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///etc/cyclonedds.xml
      - QT_X11_NO_MITSHM=1
      - LIBGL_ALWAYS_SOFTWARE=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ./src:/workspace/src:ro
    command: bash -lc "source /opt/ros/jazzy/setup.bash && rviz2"
    profiles:
      - tools

volumes:
  ollama_data:
